<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login & Signup</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e1e2f,#2c5364);
}

.container{
width:350px;
padding:30px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:#fff;
}

/* Tabs */
.tabs{
display:flex;
margin-bottom:20px;
}

.tabs button{
flex:1;
padding:10px;
border:none;
background:transparent;
color:#fff;
font-size:16px;
cursor:pointer;
border-bottom:2px solid transparent;
}

.tabs button.active{
border-bottom:2px solid #00c6ff;
}

/* Forms */
.form{
display:none;
flex-direction:column;
}

.form.active{
display:flex;
}

input{
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

button.submit{
margin-top:10px;
padding:12px;
border:none;
border-radius:8px;
background:#00c6ff;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button.submit:hover{
background:#0072ff;
}

h2{
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<button id="loginTab" class="active" onclick="switchTab('login')">Login</button>
<button id="signupTab" onclick="switchTab('signup')">Signup</button>
</div>

<!-- LOGIN -->
<div id="loginForm" class="form active">
<h2>Login</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button class="submit" onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div id="signupForm" class="form">
<h2>Signup</h2>
<input type="text" id="signupUser" placeholder="Username">
<input type="password" id="signupPass" placeholder="Password">
<button class="submit" onclick="signup()">Signup</button>
</div>

</div>

<script>

// switch tabs
function switchTab(tab){
document.getElementById("loginForm").classList.remove("active");
document.getElementById("signupForm").classList.remove("active");

document.getElementById("loginTab").classList.remove("active");
document.getElementById("signupTab").classList.remove("active");

if(tab==="login"){
document.getElementById("loginForm").classList.add("active");
document.getElementById("loginTab").classList.add("active");
}else{
document.getElementById("signupForm").classList.add("active");
document.getElementById("signupTab").classList.add("active");
}
}

// signup
function signup(){
let u=document.getElementById("signupUser").value;
let p=document.getElementById("signupPass").value;

if(u===""||p===""){
alert("Fill all fields");
return;
}

localStorage.setItem(u,p);
alert("Signup successful! Now login.");
switchTab("login");
}

// login
function login(){
let u=document.getElementById("loginUser").value;
let p=document.getElementById("loginPass").value;

if(localStorage.getItem(u)===p){
alert("Login successful!");
window.location.href="index.html";
}else{
alert("Invalid username or password");
}
}

</script>

</body>
</html>
